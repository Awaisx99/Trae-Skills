<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSAP Scroll-Reveal Image Effect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .scroll-container {
            position: relative;
            height: 200vh;
        }

        .hero-section {
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
            overflow: hidden;
        }

        .hero-nav-top {
            position: absolute;
            top: 2rem;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 4rem;
            color: rgba(255,255,255,0.7);
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 500;
        }

        .hero-heading {
            color: white;
            font-size: clamp(3rem, 12vw, 12rem);
            font-weight: 900;
            text-align: center;
            line-height: 0.9;
            z-index: 1;
            position: relative;
        }

        .hero-nav-bottom {
            position: absolute;
            bottom: 2rem;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 4rem;
            color: rgba(255,255,255,0.6);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 500;
        }

        .hero-image-wrap {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            width: 30%;
            min-width: 300px;
        }

        .hero-image {
            width: 100%;
            display: block;
            border-radius: 12px;
            box-shadow: 0 30px 60px -15px rgba(0,0,0,0.5);
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
</head>
<body>
    <div class="scroll-container">
        <section class="hero-section">
            <div class="hero-nav-top">
                <span>Menu</span>
                <span>sundaecreative</span>
                <span>Let's Talk</span>
            </div>
            <h1 class="hero-heading">
                A GLOBAL<br>
                COMMUNICATIONS<br>
                & PR AGENCY FOR<br>
                LIFESTYLE BRANDS
            </h1>
            <div class="hero-nav-bottom">
                <span>WE STRATEGICALLY<br>COMMUNICATE</span>
                <span>WITH AUDIENCES</span>
            </div>
            <div class="hero-image-wrap">
                <img class="hero-image" src="https://images.unsplash.com/photo-1573496799652-408c2ac9fe98?w=800&h=600&fit=crop" alt="Hero">
            </div>
        </section>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            gsap.registerPlugin(ScrollTrigger);
            
            const imageWrap = document.querySelector('.hero-image-wrap');
            
            gsap.to(imageWrap, {
                width: '100vw',
                y: () => window.innerHeight / 2 + (window.innerHeight * 0.45),
                borderRadius: '0px',
                ease: 'none',
                scrollTrigger: {
                    trigger: '.scroll-container',
                    start: 'top top',
                    end: 'bottom top',
                    scrub: 1,
                    pin: '.hero-section'
                }
            });
        });
    </script>
</body>
</html>
